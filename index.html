<!DOCTYPE html>
<html>
<head>
<title>Recipe Maker AI 🍳</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* Header */
.header {
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    background: #020617;
    border-bottom: 1px solid #1e293b;
}

/* Chat */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* Messages */
.message {
    max-width: 75%;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 12px;
    line-height: 1.5;
}

.user {
    background: #3b82f6;
    margin-left: auto;
}

.bot {
    background: #1e293b;
}

/* Input */
.input-area {
    display: flex;
    padding: 12px;
    background: #020617;
    border-top: 1px solid #1e293b;
}

textarea {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    resize: none;
}

button {
    margin-left: 10px;
    padding: 10px 18px;
    background: #3b82f6;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* Recipe Card */
.card {
    background: linear-gradient(145deg, #1e293b, #020617);
    padding: 15px;
    border-radius: 12px;
    margin-top: 10px;
    border: 1px solid #334155;
}

.title {
    font-weight: bold;
    font-size: 18px;
    color: #38bdf8;
    margin-bottom: 10px;
}

img {
    width: 100%;
    border-radius: 10px;
    margin: 10px 0;
}

.bot-extra {
    margin-top: 10px;
}

.bot-extra button {
    margin: 5px;
    padding: 6px 12px;
    background: #334155;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">🍳 Recipe Maker AI</div>

<div class="chat" id="chat">
    <div class="message bot">
        👋 Tell me ingredients or a dish (e.g. "egg", "chicken", "quick breakfast")
    </div>
</div>

<div class="input-area">
    <textarea id="input" placeholder="Type ingredients..."></textarea>
    <button onclick="sendMessage()">Send</button>
</div>

<script>

let chatHistory = [];

function addMessage(content, type) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerHTML = content;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    return div;
}

async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");

    chatHistory.push({ role: "user", content: text });

    input.value = "";

    const loading = addMessage("⏳ Cooking ideas...", "bot");

    try {
        const res = await fetch("https://ai-food-maker.onrender.com/generate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                messages: chatHistory
            })
        });

        const data = await res.json();

        chatHistory.push({
            role: "assistant",
            content: JSON.stringify(data)
        });

        renderResponse(data, loading);

    } catch {
        loading.innerHTML = "❌ Server error";
    }
}

function renderResponse(data, element) {

    let html = "";

    // 🔹 Message (fallback / redirect)
    if (data.message) {
        html += `<p>${data.message}</p>`;
    }

    // 🔹 Recipes
    if (data.recipes && data.recipes.length > 0) {
        data.recipes.forEach(r => {
            const img = `https://source.unsplash.com/400x300/?${r.name}`;

            html += `
                <div class="card">
                    <div class="title">${r.name}</div>

                    <img src="${img}">

                    <b>🧂 Ingredients:</b>
                    <ul>${r.ingredients.map(i => `<li>${i}</li>`).join("")}</ul>

                    <b>👨‍🍳 Steps:</b>
                    <ol>${r.steps.map(s => `<li>${s}</li>`).join("")}</ol>

                    <a href="https://www.youtube.com/results?search_query=${r.name}+recipe" target="_blank">
                        ▶️ Watch Tutorial
                    </a>
                </div>
            `;
        });
    }

    // 🔹 Always guide user back to food
    html += `
        <div class="bot-extra">
            <p>${data.question || "What do you want to cook next?"}</p>
            ${(data.options || ["Egg recipes", "Chicken recipes", "Quick meals"]).map(opt =>
                `<button onclick="quickSend('${opt}')">${opt}</button>`
            ).join("")}
        </div>
    `;

    element.innerHTML = html;
}

function quickSend(text) {
    document.getElementById("input").value = text;
    sendMessage();
}

document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

</script>

</body>
</html>
